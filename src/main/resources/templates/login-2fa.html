<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar acesso</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: #18211d;
            background: #f4f7f1;
        }

        main {
            width: min(100% - 32px, 420px);
            padding: 32px;
            background: #ffffff;
            border-radius: 8px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.7rem;
        }

        p {
            margin: 0 0 24px;
            line-height: 1.55;
            color: #53615b;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 48px;
            margin-bottom: 18px;
            padding: 12px;
            border: 1px solid #b7c2ba;
            border-radius: 8px;
            font: inherit;
        }

        button {
            width: 100%;
            min-height: 48px;
            border: 0;
            border-radius: 8px;
            background: #1f6f5b;
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .erro,
        .dev-code {
            margin-bottom: 18px;
            padding: 12px;
            border-radius: 8px;
        }

        .erro {
            background: #ffe8e5;
            color: #8d271c;
        }

        .dev-code {
            background: #e8f1ff;
            color: #153f7a;
        }
    </style>
</head>
<body>
<main>
    <h1>Confirmar acesso</h1>
    <p>Informe o código de verificação para continuar.</p>

    <div class="erro" th:if="${param.erro}">Código inválido ou expirado.</div>
    <div class="dev-code" th:if="${param.codigoDev}">
        Código dev: <strong th:text="${param.codigoDev}"></strong>
    </div>

    <form method="post" action="/login/2fa">
        <input type="hidden" name="desafioId" th:value="${param.desafio}">

        <label for="codigo">Código</label>
        <input id="codigo" name="codigo" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>

        <button type="submit">Confirmar</button>
    </form>
</main>
</body>
</html>
